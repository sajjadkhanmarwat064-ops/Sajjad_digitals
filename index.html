<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAJJAD DIGITALS</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      overflow-x:hidden;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 10%;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      color:#00ffcc;
      font-size:30px;
      font-weight:bold;
      text-shadow:0 0 10px #00ffcc;
    }

    .navbar a{
      color:white;
      margin-left:20px;
      text-decoration:none;
      transition:0.3s;
    }

    .navbar a:hover{
      color:#00ffcc;
    }

    /* HERO */
    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:60px;
      color:#00ffcc;
      text-shadow:0 0 20px #00ffcc;
      animation:float 3s infinite ease-in-out;
    }

    .typing{
      font-size:24px;
      margin-top:15px;
      color:#ccc;
      border-right:2px solid #00ffcc;
      white-space:nowrap;
      overflow:hidden;
      width:0;
      animation:typing 5s steps(40,end) infinite alternate;
    }

    .btn{
      margin-top:30px;
      padding:14px 30px;
      background:#00ffcc;
      color:black;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      background:white;
    }

    /* SECTION */
    .section{
      padding:80px 10%;
      text-align:center;
    }

    .section h2{
      color:#00ffcc;
      margin-bottom:40px;
      font-size:38px;
    }

    /* SERVICES */
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      padding:30px;
      border-radius:20px;
      transition:0.4s;
      backdrop-filter:blur(10px);
    }

    .card:hover{
      transform:translateY(-10px);
      border-color:#00ffcc;
      box-shadow:0 0 20px #00ffcc55;
    }

    .card h3{
      color:#00ffcc;
      margin-bottom:15px;
    }

    /* PORTFOLIO */
    .portfolio{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .portfolio-box{
      height:180px;
      background:#1a1a1a;
      border-radius:20px;
      transition:0.4s;
    }

    .portfolio-box:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px #00ffcc66;
